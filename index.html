<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vspo! Schedule</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Sans:wght@500;700&display=swap" rel="stylesheet">
<style>
:root {
  --purple:    #7c3aed;
  --purple-lt: #ede9fe;
  --purple-md: #ddd6fe;
  --purple-dk: #5b21b6;
  --bg:        #faf9ff;
  --surface:   #ffffff;
  --border:    #e8e3fa;
  --text:      #1e1b2e;
  --muted:     #6b7280;
  --live:      #ef4444;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { font-size: 15px; }
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── LOADING ── */
#loading {
  position:fixed; inset:0; z-index:999;
  background: var(--bg);
  display:flex; align-items:center; justify-content:center; flex-direction:column; gap:14px;
}
.spin {
  width:36px; height:36px; border-radius:50%;
  border:3px solid var(--purple-md);
  border-top-color: var(--purple);
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── HEADER ── */
header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(255,255,255,.95);
  backdrop-filter: blur(12px);
  border-bottom: 1.5px solid var(--border);
  padding: 0 16px;
  height: 54px;
  display: flex; align-items: center; justify-content: space-between;
}
.logo {
  display: flex; align-items: center; gap: 9px;
  font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 1.1rem;
  color: var(--purple); letter-spacing: .02em;
}
.logo-dot {
  width: 28px; height: 28px;
  background: linear-gradient(135deg, var(--purple), #a78bfa);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
}
.lang-row { display: flex; gap: 2px; }
.lang-btn {
  background: none; border: 1.5px solid var(--border);
  color: var(--muted); font-size: .75rem; font-weight: 700;
  padding: 4px 9px; border-radius: 6px; cursor: pointer;
  transition: all .15s;
}
.lang-btn.on { background: var(--purple); border-color: var(--purple); color: #fff; }

/* ── LIVE BAR ── */
.live-bar {
  display: none;
  background: #fff5f5; border-bottom: 1.5px solid #fecaca;
  padding: 7px 16px; align-items: center; gap: 10px;
  overflow: hidden;
}
.live-bar.show { display: flex; }
.live-pill {
  flex-shrink: 0; background: var(--live); color: #fff;
  font-size: .65rem; font-weight: 700; padding: 2px 7px;
  border-radius: 99px; letter-spacing: .08em;
  animation: blink 1.4s infinite;
}
@keyframes blink { 50% { opacity: .55; } }
.live-names { display: flex; gap: 7px; overflow-x: auto; flex: 1; scrollbar-width: none; }
.live-names::-webkit-scrollbar { display: none; }
.live-chip {
  flex-shrink: 0; display: flex; align-items: center; gap: 5px;
  background: #fff; border: 1.5px solid #fecaca;
  color: var(--live); font-size: .78rem; font-weight: 600;
  padding: 3px 10px; border-radius: 99px;
  text-decoration: none; transition: background .12s;
}
.live-chip:hover { background: #fff5f5; }
.live-chip img {
  width: 18px; height: 18px; border-radius: 50%; object-fit: cover;
  border: 1px solid #fecaca;
}

/* ── MAIN LAYOUT ── */
main { max-width: 800px; margin: 0 auto; padding: 20px 14px 100px; }

/* ── MEMBER STRIP ── */
.members-row {
  display: flex; gap: 8px; overflow-x: auto;
  padding: 2px 0 10px; scrollbar-width: none; margin-bottom: 20px;
}
.members-row::-webkit-scrollbar { display: none; }
.m-chip {
  flex-shrink: 0; display: flex; align-items: center; gap: 6px;
  padding: 5px 11px 5px 5px;
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: 99px; cursor: pointer; transition: all .15s;
  position: relative;
}
.m-chip:hover { border-color: var(--member-color, var(--purple)); }
.m-chip.on {
  background: color-mix(in srgb, var(--member-color, var(--purple)) 10%, #fff);
  border-color: var(--member-color, var(--purple));
}
.m-chip img, .m-chip .m-ini {
  width: 26px; height: 26px; border-radius: 50%; object-fit: cover;
  border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: .75rem; font-weight: 700;
  background: color-mix(in srgb, var(--member-color, var(--purple)) 18%, #fff);
  color: var(--member-color, var(--purple));
}
.m-chip.on img, .m-chip.on .m-ini { border-color: var(--member-color, var(--purple)); }
.m-chip-name { font-size: .75rem; font-weight: 700; color: var(--text); white-space: nowrap; }
.m-live-dot {
  position: absolute; top: 2px; right: 2px;
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--live); border: 1.5px solid #fff;
}

/* ── DATE TABS ── */
.date-tabs {
  display: flex; gap: 6px; overflow-x: auto;
  padding-bottom: 2px; scrollbar-width: none; margin-bottom: 16px;
}
.date-tabs::-webkit-scrollbar { display: none; }
.d-tab {
  flex-shrink: 0; padding: 7px 13px; text-align: center;
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: 10px; cursor: pointer; transition: all .15s;
}
.d-tab:hover { border-color: var(--purple); }
.d-tab.on { background: var(--purple); border-color: var(--purple); color: #fff; }
.d-tab .wd { font-size: .68rem; font-weight: 600; color: var(--muted); }
.d-tab.on .wd { color: rgba(255,255,255,.75); }
.d-tab .dd { font-size: .9rem; font-weight: 700; margin-top: 1px; }

/* ── FILTER STATUS ── */
.filter-bar {
  display: none; align-items: center; gap: 8px;
  padding: 7px 12px; background: var(--purple-lt);
  border-radius: 8px; margin-bottom: 12px;
  font-size: .78rem; color: var(--purple-dk); font-weight: 600;
}
.filter-bar.show { display: flex; }
.filter-bar button {
  margin-left: auto; background: none; border: none;
  color: var(--purple); cursor: pointer; font-size: .78rem; font-weight: 700;
}

/* ── SCHEDULE LIST ── */
.schedule-list { display: flex; flex-direction: column; gap: 7px; }

.s-card {
  display: flex; align-items: center; gap: 12px;
  padding: 11px 14px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-left: 3.5px solid var(--member-color, var(--purple));
  border-radius: 10px;
  text-decoration: none; color: inherit;
  transition: all .14s;
}
.s-card:hover { box-shadow: 0 2px 12px rgba(124,58,237,.1); transform: translateX(2px); }
.s-card.is-live { background: linear-gradient(90deg, #fff5f5 0%, #fff 60%); border-left-color: var(--live); }

.s-avatar {
  width: 42px; height: 42px; border-radius: 50%; flex-shrink: 0;
  overflow: hidden; background: color-mix(in srgb, var(--member-color, var(--purple)) 14%, #fff);
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem; font-weight: 700; color: var(--member-color, var(--purple));
  border: 1.5px solid color-mix(in srgb, var(--member-color, var(--purple)) 30%, #fff);
}
.s-avatar img { width: 100%; height: 100%; object-fit: cover; }

.s-body { flex: 1; min-width: 0; }
.s-top { display: flex; align-items: center; gap: 7px; margin-bottom: 3px; flex-wrap: wrap; }
.s-name { font-size: .8rem; font-weight: 700; color: var(--purple-dk); }
.s-badge {
  font-size: .62rem; font-weight: 700; padding: 2px 6px; border-radius: 5px;
}
.s-badge.yt     { background: #fee2e2; color: #b91c1c; }
.s-badge.tw     { background: var(--purple-lt); color: var(--purple); }
.s-badge.live   { background: var(--live); color: #fff; animation: blink 1.4s infinite; }
.s-title { font-size: .82rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.s-time { flex-shrink: 0; text-align: right; }
.s-time .hm { font-family: 'DM Sans', sans-serif; font-size: 1.1rem; font-weight: 700; color: var(--purple); line-height: 1; }
.s-time .dur { font-size: .65rem; color: var(--muted); margin-top: 2px; }

/* ── EMPTY ── */
.empty {
  text-align: center; padding: 52px 16px; color: var(--muted);
}
.empty-icon { font-size: 2.2rem; margin-bottom: 10px; }
.empty-text { font-size: .85rem; }

/* ── BOTTOM NAV (mobile) ── */
.bottom-nav {
  display: none;
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  background: rgba(255,255,255,.97);
  backdrop-filter: blur(12px);
  border-top: 1.5px solid var(--border);
  padding: 8px 0 max(8px, env(safe-area-inset-bottom));
  justify-content: space-around;
}
.bn-btn {
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  background: none; border: none; cursor: pointer;
  color: var(--muted); font-size: .68rem; font-weight: 600;
  padding: 4px 16px; transition: color .15s;
}
.bn-btn .ico { font-size: 1.35rem; }
.bn-btn.on { color: var(--purple); }

/* ── FOOTER ── */
footer {
  border-top: 1.5px solid var(--border);
  padding: 14px 16px; text-align: center;
  font-size: .72rem; color: var(--muted);
  display: flex; align-items: center; justify-content: center; gap: 12px; flex-wrap: wrap;
}
.upd-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #22c55e; vertical-align: middle; margin-right: 3px; }

/* ── RESPONSIVE ── */
@media (max-width: 600px) {
  header nav { display: none; }
  .bottom-nav { display: flex; }
  main { padding: 14px 10px 84px; }
  .s-card { padding: 10px 10px; gap: 9px; }
  .s-avatar { width: 36px; height: 36px; }
  .s-time .hm { font-size: .95rem; }
}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading">
  <div class="spin"></div>
  <div style="font-size:.8rem;color:var(--purple);font-weight:600">読み込み中…</div>
</div>

<!-- HEADER -->
<header>
  <div class="logo">
    <div class="logo-dot">⚡</div>
    <span>Vspo! Schedule</span>
  </div>
  <div class="lang-row">
    <button class="lang-btn on" onclick="setLang('ja')">JP</button>
    <button class="lang-btn"   onclick="setLang('en')">EN</button>
  </div>
</header>

<!-- LIVE BAR -->
<div class="live-bar" id="liveBar">
  <div class="live-pill">LIVE</div>
  <div class="live-names" id="liveNames"></div>
</div>

<!-- MAIN -->
<main>
  <!-- メンバー横スクロール -->
  <div class="members-row" id="membersRow"></div>

  <!-- フィルター中表示 -->
  <div class="filter-bar" id="filterBar">
    <span id="filterLabel"></span>
    <button onclick="clearFilter()">✕ 解除</button>
  </div>

  <!-- 日付タブ -->
  <div class="date-tabs" id="dateTabs"></div>

  <!-- スケジュール -->
  <div class="schedule-list" id="scheduleList"></div>
</main>

<!-- FOOTER -->
<footer>
  <span>© 2026 非公式ファンサイト</span>
  <span><span class="upd-dot"></span><span id="updTime">—</span></span>
</footer>

<!-- BOTTOM NAV -->
<div class="bottom-nav" id="bottomNav">
  <button class="bn-btn on" id="bnHome" onclick="scrollToTop()">
    <span class="ico">📅</span><span>スケジュール</span>
  </button>
  <button class="bn-btn" onclick="toggleLang()">
    <span class="ico">🌐</span><span id="bnLangLabel">EN</span>
  </button>
</div>

<script>
// ─────────────────────────────────────────────
// メンバーデータ
// ─────────────────────────────────────────────
const MEMBERS = [
  { id:'sumire',  ja:'花芽すみれ',   en:'Kaga Sumire',       ch:'UCyLGcqYs7RsBb3L0SJfzGYA', tw:'kagasumire',   color:'#ec4899' },
  { id:'nazuna',  ja:'花芽なずな',   en:'Kaga Nazuna',       ch:'UCiMG6VdScBabPhJ1ZtaVmbw', tw:'nazunalive',   color:'#8b5cf6' },
  { id:'toto',    ja:'小雀とと',     en:'Kogara Toto',       ch:'UCgTzsBI0DIRopMylJEDqnog', tw:'',             color:'#f97316' },
  { id:'uruha',   ja:'一ノ瀬うるは', en:'Ichinose Uruha',    ch:'UC5LyYg6cCA4yHEYvtUsir3g', tw:'ichinose_uruha',color:'#db2777' },
  { id:'noah',    ja:'胡桃のあ',     en:'Kurumi Noah',       ch:'UCIcAj6WkJ8vZ7DeJVgmeqKw', tw:'963noah',      color:'#059669' },
  { id:'mimi',    ja:'兎咲ミミ',     en:'Tosaki Mimi',       ch:'UCnvVG9RbOW3J6Ifqo-zKLiw', tw:'',             color:'#f472b6' },
  { id:'sena',    ja:'空澄セナ',     en:'Asumi Sena',        ch:'UCF_U2GCKHvDz52jWdizppIA', tw:'kasumisena',   color:'#3b82f6' },
  { id:'hinano',  ja:'橘ひなの',     en:'Tachibana Hinano',  ch:'UCvUc0m317LWTTPZoBQV479A', tw:'hinano_vspo',  color:'#d97706' },
  { id:'lisa',    ja:'英リサ',       en:'Hanabusa Lisa',     ch:'UCurEA8YoqFwimJcAuSHU0MQ', tw:'lisahanabusa', color:'#7c3aed' },
  { id:'ren',     ja:'如月れん',     en:'Kisaragi Ren',      ch:'UCGWa1dMU_sDCaRQjdabsVgg', tw:'ren_vspo',     color:'#0ea5e9' },
  { id:'kyupi',   ja:'神成きゅぴ',   en:'Kaminari Qpi',      ch:'UCMp55EbT_ZlqiMS3lCj01BQ', tw:'kyupi_vspo',   color:'#ca8a04' },
  { id:'beni',    ja:'八雲べに',     en:'Yakumo Beni',       ch:'UCjXBuHmWkieBApgBhDuJMMQ', tw:'',             color:'#dc2626' },
  { id:'ema',     ja:'藍沢エマ',     en:'Aizawa Ema',        ch:'UCPkKpOHxEDcwmUAnRpIu-5A', tw:'aizawa_ema',   color:'#10b981' },
  { id:'runa',    ja:'紫宮るな',     en:'Shinomiya Runa',    ch:'UCD5W21JqNMv_tV9nfjvF9sw', tw:'runa_vspo',    color:'#6366f1' },
  { id:'tuna',    ja:'猫汰つな',     en:'Nekota Tsuna',      ch:'UCIjdfjcSaEgdjwbgjxC3ZWg', tw:'nekota_tsuna', color:'#f87171' },
  { id:'ramune',  ja:'白波らむね',   en:'Shiranami Ramune',  ch:'UC61OwuYOVuKkpKnid-43Twg', tw:'ramune_vspo',  color:'#22c55e' },
  { id:'meto',    ja:'小森めと',     en:'Komori Met',        ch:'UCzUNASdzI4PV5SlqtYwAkKQ', tw:'meto_vspo',    color:'#a78bfa' },
  { id:'akari',   ja:'夢野あかり',   en:'Yumeno Akari',      ch:'UCS5l_Y0oMVTjEos2LuyeSZQ', tw:'akari_vspo',   color:'#fbbf24' },
  { id:'kuromu',  ja:'夜乃くろむ',   en:'Yano Kuromu',       ch:'UCX4WL24YEOUYd7qDsFSLDOw', tw:'kuromu_vspo',  color:'#818cf8' },
  { id:'kokage',  ja:'紡木こかげ',   en:'Tsumugi Kokage',    ch:'UC-WX1CXssCtCtc2TNIRnJzg', tw:'kokage_tsumugi',color:'#2dd4bf' },
  { id:'yuuhi',   ja:'千燈ゆうひ',   en:'Sendo Yuuhi',       ch:'UCuDY3ibSP2MFRgf7eo3cojg', tw:'yuuhi_vspo',   color:'#fb7185' },
  { id:'hanabi',  ja:'蝶屋はなび',   en:'Choya Hanabi',      ch:'UCL9hJsdk9eQa0IlWbFB2oRg', tw:'',             color:'#fb923c' },
  { id:'moka',    ja:'甘結もか',     en:'Amayui Moka',       ch:'UC8vKBjGY2HVfbW9GAmgikWw', tw:'',             color:'#38bdf8' },
  { id:'saine',   ja:'銀城サイネ',   en:'Ginjo Saine',       ch:'UC2xXx1m1jeL0W84_0jTg-Yw', tw:'',             color:'#86efac' },
  { id:'chise',   ja:'龍巻ちせ',     en:'Tatsumaki Chise',   ch:'UCoW8qQy80mKH0RJTKAKKhg',  tw:'',             color:'#d8b4fe' },
];

// ─────────────────────────────────────────────
// 状態
// ─────────────────────────────────────────────
let lang       = 'ja';
let filterMem  = null;  // 選択中メンバーID
let activeDay  = 0;     // 0=今日, 1=明日 …
let SCHEDULE   = [];
let LIVE       = [];
let ICONS      = {};    // { memberId: iconUrl }
const TODAY    = new Date();

// ─────────────────────────────────────────────
// データ取得
// ─────────────────────────────────────────────
async function load() {
  const safe = (p) => p.catch(() => null);
  const [sch, lv, mem] = await Promise.all([
    safe(fetch('schedule.json?t='+Date.now()).then(r=>r.json())),
    safe(fetch('live.json?t='+Date.now()).then(r=>r.json())),
    safe(fetch('members.json?t='+Date.now()).then(r=>r.json())),
  ]);
  SCHEDULE = Array.isArray(sch) ? sch : [];
  LIVE     = Array.isArray(lv)  ? lv  : [];
  if (Array.isArray(mem)) mem.forEach(m => { if (m.iconUrl) ICONS[m.id] = m.iconUrl; });
}

// ─────────────────────────────────────────────
// 初期化
// ─────────────────────────────────────────────
async function init() {
  await load();
  document.getElementById('loading').style.display = 'none';
  renderAll();
  setInterval(async () => {
    const lv = await fetch('live.json?t='+Date.now()).then(r=>r.json()).catch(()=>[]);
    LIVE = Array.isArray(lv) ? lv : [];
    renderLiveBar(); renderMembers();
  }, 5 * 60 * 1000);
  setInterval(async () => {
    const sch = await fetch('schedule.json?t='+Date.now()).then(r=>r.json()).catch(()=>[]);
    SCHEDULE = Array.isArray(sch) ? sch : [];
    renderSchedule();
    document.getElementById('updTime').textContent = fmtNow();
  }, 30 * 60 * 1000);
}

function renderAll() {
  renderLiveBar();
  renderMembers();
  renderDateTabs();
  renderSchedule();
  document.getElementById('updTime').textContent = fmtNow();
}

// ─────────────────────────────────────────────
// 言語
// ─────────────────────────────────────────────
function setLang(l) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('on', b.textContent.trim() === l.toUpperCase()));
  const lbl = document.getElementById('bnLangLabel');
  if (lbl) lbl.textContent = l === 'ja' ? 'EN' : 'JP';
  renderAll();
}
function toggleLang() { setLang(lang === 'ja' ? 'en' : 'ja'); }

// ─────────────────────────────────────────────
// Live バー
// ─────────────────────────────────────────────
function renderLiveBar() {
  const bar = document.getElementById('liveBar');
  if (!LIVE.length) { bar.classList.remove('show'); return; }
  bar.classList.add('show');
  document.getElementById('liveNames').innerHTML = LIVE.map(l => {
    const m = MEMBERS.find(x => x.id === l.memberId);
    if (!m) return '';
    const name = lang === 'ja' ? m.ja : m.en;
    const icon = ICONS[m.id];
    return `<a class="live-chip" href="${l.url}" target="_blank" rel="noopener">
      ${icon ? `<img src="${icon}" referrerpolicy="no-referrer" onerror="this.style.display='none'">` : '🔴'}
      ${name}
    </a>`;
  }).join('');
}

// ─────────────────────────────────────────────
// メンバー一覧（横スクロール）
// ─────────────────────────────────────────────
function renderMembers() {
  const liveIds = new Set(LIVE.map(l => l.memberId));
  document.getElementById('membersRow').innerHTML = MEMBERS.map(m => {
    const name = lang === 'ja' ? m.ja : m.en;
    const icon = ICONS[m.id];
    const on   = filterMem === m.id;
    const live = liveIds.has(m.id);
    return `<div class="m-chip ${on ? 'on' : ''}" style="--member-color:${m.color}" onclick="toggleFilter('${m.id}','${name}')">
      ${live ? '<div class="m-live-dot"></div>' : ''}
      ${icon
        ? `<img src="${icon}" referrerpolicy="no-referrer" onerror="this.style.display='none';this.nextSibling.style.display='flex'">`
        : ''}
      <div class="m-ini" style="${icon ? 'display:none' : ''}">${m.ja[0]}</div>
      <span class="m-chip-name">${name}</span>
    </div>`;
  }).join('');
}

// ─────────────────────────────────────────────
// フィルター
// ─────────────────────────────────────────────
function toggleFilter(id, name) {
  filterMem = filterMem === id ? null : id;
  const bar = document.getElementById('filterBar');
  if (filterMem) {
    bar.classList.add('show');
    document.getElementById('filterLabel').textContent = `${name} のスケジュール`;
  } else {
    bar.classList.remove('show');
  }
  renderMembers();
  renderSchedule();
}
function clearFilter() {
  filterMem = null;
  document.getElementById('filterBar').classList.remove('show');
  renderMembers();
  renderSchedule();
}

// ─────────────────────────────────────────────
// 日付タブ
// ─────────────────────────────────────────────
const WD_JA = ['日','月','火','水','木','金','土'];
const WD_EN = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

function renderDateTabs() {
  document.getElementById('dateTabs').innerHTML = Array.from({length:7}, (_,i) => {
    const d  = new Date(TODAY);
    d.setDate(d.getDate() + i);
    const wd = (lang === 'ja' ? WD_JA : WD_EN)[d.getDay()];
    const label = i === 0 ? (lang === 'ja' ? '今日' : 'Today')
                : i === 1 ? (lang === 'ja' ? '明日' : 'Tmrw') : wd;
    return `<div class="d-tab ${activeDay === i ? 'on' : ''}" onclick="setDay(${i})">
      <div class="wd">${label}</div>
      <div class="dd">${d.getMonth()+1}/${d.getDate()}</div>
    </div>`;
  }).join('');
}
function setDay(i) { activeDay = i; renderDateTabs(); renderSchedule(); }

// ─────────────────────────────────────────────
// スケジュールリスト
// ─────────────────────────────────────────────
function renderSchedule() {
  const tgt = new Date(TODAY);
  tgt.setDate(tgt.getDate() + activeDay);

  // live.json（配信中）と schedule.json（予定）をマージ
  const liveItems  = LIVE.map(l => ({...l, isLive:true, datetime: l.startedAt}));
  const schedItems = SCHEDULE.filter(s => !LIVE.some(l => l.memberId === s.memberId && l.platform === s.platform));
  const all = [...liveItems, ...schedItems];

  const items = all.filter(s => {
    const dt = new Date(s.datetime);
    return dt.getFullYear() === tgt.getFullYear()
        && dt.getMonth()    === tgt.getMonth()
        && dt.getDate()     === tgt.getDate()
        && (!filterMem || s.memberId === filterMem);
  }).sort((a,b) => new Date(a.datetime) - new Date(b.datetime));

  const list = document.getElementById('scheduleList');

  if (!items.length) {
    list.innerHTML = `<div class="empty">
      <div class="empty-icon">📭</div>
      <div class="empty-text">${lang==='ja' ? 'この日の配信予定はありません' : 'No streams scheduled'}</div>
    </div>`;
    return;
  }

  list.innerHTML = items.map(s => {
    const m = MEMBERS.find(x => x.id === s.memberId);
    if (!m) return '';
    const name  = lang === 'ja' ? m.ja : m.en;
    const dt    = new Date(s.datetime);
    const hh    = String(dt.getHours()).padStart(2,'0');
    const mm    = String(dt.getMinutes()).padStart(2,'0');
    const dur   = s.durationMin && s.durationMin > 0
      ? `${Math.floor(s.durationMin/60)}h${s.durationMin%60 ? s.durationMin%60+'m' : ''}` : '';
    const plat  = s.isLive ? 'LIVE' : (s.platform === 'youtube' ? 'YouTube' : 'Twitch');
    const bcls  = s.isLive ? 'live' : (s.platform === 'youtube' ? 'yt' : 'tw');
    const url   = s.url || `https://www.youtube.com/channel/${m.ch}`;
    const icon  = ICONS[m.id];
    const ini   = m.ja[0];
    return `<a class="s-card ${s.isLive ? 'is-live' : ''}" href="${url}" target="_blank" rel="noopener"
        style="--member-color:${m.color}">
      <div class="s-avatar">
        ${icon ? `<img src="${icon}" referrerpolicy="no-referrer" onerror="this.style.display='none'">` : ini}
      </div>
      <div class="s-body">
        <div class="s-top">
          <span class="s-name">${name}</span>
          <span class="s-badge ${bcls}">${plat}</span>
        </div>
        <div class="s-title">${s.title || '—'}</div>
      </div>
      <div class="s-time">
        <div class="hm">${hh}:${mm}</div>
        ${dur ? `<div class="dur">⏱ ${dur}</div>` : ''}
      </div>
    </a>`;
  }).join('');
}

// ─────────────────────────────────────────────
// ユーティリティ
// ─────────────────────────────────────────────
function fmtNow() {
  const n = new Date();
  return `更新 ${n.getMonth()+1}/${n.getDate()} ${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;
}
function scrollToTop() { window.scrollTo({top:0, behavior:'smooth'}); }

init();
</script>
