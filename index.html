<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vspo! Schedule</title>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #06060f;
      --surface:  #0e0e1e;
      --surface2: #16162a;
      --border:   #2a2a4a;
      --accent:   #7c5cfc;
      --accent2:  #fc5c9c;
      --live:     #fc3c3c;
      --text:     #e8e8f8;
      --muted:    #6868a0;
      --yt:       #ff4444;
      --twitch:   #9146ff;
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Zen Kaku Gothic New', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }
    body::before {
      content:'';
      position:fixed; inset:0;
      background-image:
        linear-gradient(rgba(124,92,252,.04) 1px,transparent 1px),
        linear-gradient(90deg,rgba(124,92,252,.04) 1px,transparent 1px);
      background-size:40px 40px;
      pointer-events:none; z-index:0;
    }

    /* ── HEADER ── */
    header {
      position:sticky; top:0; z-index:100;
      background:rgba(6,6,15,.88);
      backdrop-filter:blur(16px);
      border-bottom:1px solid var(--border);
      padding:0 32px; height:64px;
      display:flex; align-items:center; justify-content:space-between;
    }
    .logo { display:flex; align-items:center; gap:12px; }
    .logo-icon {
      width:36px; height:36px;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      border-radius:8px;
      display:flex; align-items:center; justify-content:center;
      font-size:18px;
    }
    .logo-text {
      font-family:'Rajdhani',sans-serif; font-weight:700; font-size:1.4rem;
      letter-spacing:.1em;
      background:linear-gradient(90deg,#fff 40%,var(--accent));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    }
    .logo-sub { font-size:.65rem; color:var(--muted); letter-spacing:.2em; text-transform:uppercase; }
    nav { display:flex; align-items:center; gap:8px; }
    .nav-btn {
      background:transparent; border:1px solid var(--border);
      color:var(--muted); padding:6px 16px; border-radius:20px;
      cursor:pointer; font-family:'Rajdhani',sans-serif; font-size:.9rem;
      letter-spacing:.05em; transition:all .2s;
    }
    .nav-btn:hover,.nav-btn.active {
      border-color:var(--accent); color:#fff;
      background:rgba(124,92,252,.15);
    }
    .lang-switch {
      display:flex; gap:4px; margin-left:16px;
      border-left:1px solid var(--border); padding-left:16px;
    }
    .lang-btn {
      background:transparent; border:none; color:var(--muted);
      font-size:.8rem; cursor:pointer; padding:4px 8px;
      border-radius:4px; transition:all .2s;
      font-family:'Rajdhani',sans-serif; letter-spacing:.05em;
    }
    .lang-btn:hover,.lang-btn.active { color:#fff; background:var(--surface2); }

    /* ── LIVE BANNER ── */
    .live-banner {
      background:linear-gradient(90deg,rgba(252,60,60,.15),rgba(252,60,60,.05));
      border-bottom:1px solid rgba(252,60,60,.3);
      padding:10px 32px;
      display:flex; align-items:center; gap:16px;
      animation:slidein .4s ease;
    }
    @keyframes slidein { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:none} }
    .live-dot {
      width:10px; height:10px; background:var(--live);
      border-radius:50%; animation:blink 1.2s infinite; flex-shrink:0;
    }
    @keyframes blink {
      0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(252,60,60,.6)}
      50%{opacity:.7;box-shadow:0 0 0 6px rgba(252,60,60,0)}
    }
    .live-items { display:flex; gap:12px; flex-wrap:wrap; }
    .live-item {
      display:flex; align-items:center; gap:8px;
      background:rgba(252,60,60,.1); border:1px solid rgba(252,60,60,.3);
      border-radius:20px; padding:4px 14px 4px 8px;
      font-size:.85rem; text-decoration:none; color:#fff; transition:all .2s;
    }
    .live-item:hover { background:rgba(252,60,60,.2); }

    /* ── LOADING ── */
    .loading-screen {
      position:fixed; inset:0; z-index:200;
      background:var(--bg);
      display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:16px;
    }
    .loading-spinner {
      width:40px; height:40px;
      border:3px solid var(--border);
      border-top-color:var(--accent);
      border-radius:50%;
      animation:spin 1s linear infinite;
    }
    @keyframes spin { to{transform:rotate(360deg)} }
    .loading-text { font-size:.85rem; color:var(--muted); letter-spacing:.1em; }

    /* ── MAIN ── */
    main {
      position:relative; z-index:1;
      max-width:1280px; margin:0 auto;
      padding:32px 24px 80px;
    }
    .section-header {
      display:flex; align-items:baseline; gap:16px; margin-bottom:24px;
    }
    .section-title {
      font-family:'Rajdhani',sans-serif; font-size:1.1rem; font-weight:700;
      letter-spacing:.15em; text-transform:uppercase; color:var(--muted);
      white-space:nowrap;
    }
    .section-line { flex:1; height:1px; background:var(--border); }

    /* ── MEMBERS ── */
    #members-section { margin-bottom:48px; }
    .members-grid {
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(130px,1fr));
      gap:12px;
    }
    .member-card {
      background:var(--surface); border:1px solid var(--border);
      border-radius:12px; padding:16px 12px; text-align:center;
      cursor:pointer; transition:all .25s; position:relative; overflow:hidden;
    }
    .member-card::before {
      content:''; position:absolute; top:0; left:0; right:0; height:3px;
      background:var(--member-color,var(--accent));
    }
    .member-card:hover {
      border-color:var(--member-color,var(--accent));
      transform:translateY(-4px); box-shadow:0 12px 32px rgba(0,0,0,.4);
    }
    .member-card.active { border-color:var(--member-color,var(--accent)); background:var(--surface2); }
    .member-avatar {
      width:64px; height:64px; border-radius:50%;
      margin:0 auto 10px; background:var(--surface2);
      display:flex; align-items:center; justify-content:center;
      font-size:24px; border:2px solid var(--border); transition:border-color .2s;
      overflow:hidden;
    }
    .member-avatar img { width:100%; height:100%; object-fit:cover; }
    .member-card:hover .member-avatar,
    .member-card.active .member-avatar { border-color:var(--member-color,var(--accent)); }
    .member-name { font-size:.85rem; font-weight:700; margin-bottom:2px; }
    .member-handle { font-size:.7rem; color:var(--muted); }
    .live-badge {
      display:inline-flex; align-items:center; gap:4px;
      background:var(--live); color:#fff; font-size:.6rem; font-weight:700;
      padding:2px 7px; border-radius:10px; margin-top:6px; letter-spacing:.05em;
    }

    /* ── DATE TABS ── */
    .date-tabs {
      display:flex; gap:6px; margin-bottom:20px;
      overflow-x:auto; padding-bottom:4px;
    }
    .date-tab {
      flex-shrink:0; background:var(--surface); border:1px solid var(--border);
      border-radius:10px; padding:8px 16px; cursor:pointer;
      transition:all .2s; text-align:center; min-width:72px;
    }
    .date-tab:hover { border-color:var(--accent); }
    .date-tab.active { background:var(--accent); border-color:var(--accent); color:#fff; }
    .date-tab .weekday { font-size:.65rem; color:var(--muted); letter-spacing:.05em; }
    .date-tab.active .weekday { color:rgba(255,255,255,.7); }
    .date-tab .day { font-family:'Rajdhani',sans-serif; font-size:1.2rem; font-weight:700; }

    /* ── SCHEDULE CARDS ── */
    .schedule-list { display:flex; flex-direction:column; gap:10px; }
    .schedule-card {
      background:var(--surface); border:1px solid var(--border);
      border-radius:12px; padding:16px 20px;
      display:flex; align-items:center; gap:16px;
      transition:all .2s; position:relative; overflow:hidden;
      text-decoration:none; color:inherit;
    }
    .schedule-card::before {
      content:''; position:absolute; left:0; top:0; bottom:0;
      width:3px; background:var(--card-color,var(--accent));
    }
    .schedule-card:hover {
      border-color:var(--card-color,var(--accent));
      background:var(--surface2); transform:translateX(4px);
    }
    .schedule-card.is-live {
      border-color:rgba(252,60,60,.4); background:rgba(252,60,60,.05);
      animation:liveglow 3s infinite;
    }
    @keyframes liveglow {
      0%,100%{box-shadow:0 0 0 0 rgba(252,60,60,0)}
      50%{box-shadow:0 0 20px rgba(252,60,60,.15)}
    }
    .card-avatar {
      width:44px; height:44px; border-radius:50%;
      background:var(--surface2); display:flex; align-items:center;
      justify-content:center; font-size:20px; flex-shrink:0;
      border:2px solid var(--border); overflow:hidden;
    }
    .card-avatar img { width:100%; height:100%; object-fit:cover; }
    .card-info { flex:1; min-width:0; }
    .card-member {
      font-size:.75rem; color:var(--muted); margin-bottom:3px;
      display:flex; align-items:center; gap:8px;
    }
    .platform-badge {
      font-size:.6rem; font-weight:700; padding:1px 7px;
      border-radius:8px; letter-spacing:.05em;
    }
    .platform-badge.youtube { background:rgba(255,68,68,.2); color:#ff8888; border:1px solid rgba(255,68,68,.3); }
    .platform-badge.twitch  { background:rgba(145,70,255,.2); color:#b880ff; border:1px solid rgba(145,70,255,.3); }
    .platform-badge.live-now { background:var(--live); color:#fff; animation:blink 1.2s infinite; }
    .card-title { font-size:.95rem; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .card-time { text-align:right; flex-shrink:0; }
    .card-time .time { font-family:'Rajdhani',sans-serif; font-size:1.3rem; font-weight:700; color:#fff; line-height:1; }
    .card-time .date-label { font-size:.65rem; color:var(--muted); margin-top:2px; }
    .empty { text-align:center; padding:60px 20px; color:var(--muted); }
    .empty-icon { font-size:3rem; margin-bottom:12px; opacity:.4; }
    .empty-text { font-size:.9rem; }

    /* ══════════════════════════════════════
       ── 月間統計セクション ──
    ══════════════════════════════════════ */
    #stats-section { margin-top:56px; }
    .month-control {
      display:flex; align-items:center; gap:12px; margin-bottom:28px;
    }
    .month-nav {
      background:var(--surface); border:1px solid var(--border);
      color:var(--text); width:34px; height:34px; border-radius:8px;
      cursor:pointer; font-size:1rem; transition:all .2s;
      display:flex; align-items:center; justify-content:center;
    }
    .month-nav:hover { border-color:var(--accent); background:var(--surface2); }
    .month-label {
      font-family:'Rajdhani',sans-serif; font-size:1.1rem;
      font-weight:700; letter-spacing:.08em; min-width:120px; text-align:center;
    }
    .stats-summary {
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
      gap:12px; margin-bottom:32px;
    }
    .summary-card {
      background:var(--surface); border:1px solid var(--border);
      border-radius:12px; padding:20px;
      position:relative; overflow:hidden; transition:transform .2s;
    }
    .summary-card:hover { transform:translateY(-3px); }
    .summary-card::after {
      content:''; position:absolute; bottom:0; left:0; right:0; height:2px;
      background:var(--card-accent,var(--accent));
    }
    .summary-label { font-size:.7rem; color:var(--muted); letter-spacing:.1em; text-transform:uppercase; margin-bottom:8px; }
    .summary-value { font-family:'Rajdhani',sans-serif; font-size:2rem; font-weight:700; color:#fff; line-height:1; }
    .summary-sub { font-size:.75rem; color:var(--muted); margin-top:6px; }
    .ranking-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:32px; }
    @media(max-width:720px) { .ranking-grid { grid-template-columns:1fr; } }
    .ranking-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:20px; }
    .ranking-card-title { font-size:.75rem; color:var(--muted); letter-spacing:.1em; text-transform:uppercase; margin-bottom:16px; }
    .rank-row { display:flex; align-items:center; gap:10px; margin-bottom:12px; }
    .rank-num { font-family:'Rajdhani',sans-serif; font-size:.85rem; font-weight:700; color:var(--muted); width:20px; text-align:center; flex-shrink:0; }
    .rank-num.gold   { color:#fbbf24; }
    .rank-num.silver { color:#94a3b8; }
    .rank-num.bronze { color:#c2855b; }
    .rank-emoji { font-size:1.1rem; flex-shrink:0; }
    .rank-name { font-size:.85rem; font-weight:700; flex:1; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .rank-bar-wrap { flex:2; }
    .rank-bar-bg { height:6px; background:var(--border); border-radius:3px; overflow:hidden; }
    .rank-bar-fill { height:100%; border-radius:3px; background:var(--bar-color,var(--accent)); transition:width 1s cubic-bezier(.4,0,.2,1); }
    .rank-value { font-family:'Rajdhani',sans-serif; font-size:.85rem; font-weight:700; color:var(--muted); min-width:52px; text-align:right; }
    .heatmap-wrap { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:20px; margin-bottom:32px; overflow-x:auto; }
    .heatmap-title { font-size:.75rem; color:var(--muted); letter-spacing:.1em; text-transform:uppercase; margin-bottom:16px; }
    .heatmap-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; min-width:360px; }
    .heatmap-day-label { font-size:.65rem; color:var(--muted); text-align:center; padding-bottom:4px; font-family:'Rajdhani',sans-serif; }
    .heatmap-cell {
      aspect-ratio:1; border-radius:4px; background:var(--surface2);
      border:1px solid var(--border);
      display:flex; align-items:center; justify-content:center;
      font-size:.6rem; color:var(--muted);
      position:relative; cursor:default; transition:transform .15s;
    }
    .heatmap-cell:hover { transform:scale(1.15); z-index:2; }
    .heatmap-cell[data-level="1"] { background:rgba(124,92,252,.15); border-color:rgba(124,92,252,.3); color:#a0a0d0; }
    .heatmap-cell[data-level="2"] { background:rgba(124,92,252,.3);  border-color:rgba(124,92,252,.5); color:#c0c0f0; }
    .heatmap-cell[data-level="3"] { background:rgba(124,92,252,.5);  border-color:rgba(124,92,252,.7); color:#fff; }
    .heatmap-cell[data-level="4"] { background:rgba(124,92,252,.75); border-color:var(--accent);       color:#fff; }
    .heatmap-cell.today-cell { outline:2px solid var(--accent2); outline-offset:1px; }
    .heatmap-cell.empty-cell { background:transparent; border-color:transparent; }
    .platform-breakdown { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:20px; }
    .platform-breakdown-title { font-size:.75rem; color:var(--muted); letter-spacing:.1em; text-transform:uppercase; margin-bottom:20px; }
    .platform-bars { display:flex; flex-direction:column; gap:16px; }
    .platform-row { display:flex; flex-direction:column; gap:6px; }
    .platform-row-header { display:flex; justify-content:space-between; align-items:center; }
    .platform-name { font-size:.85rem; font-weight:700; }
    .platform-pct { font-family:'Rajdhani',sans-serif; font-size:.9rem; color:var(--muted); }
    .platform-full-bar { height:8px; background:var(--border); border-radius:4px; overflow:hidden; }
    .platform-full-fill { height:100%; border-radius:4px; transition:width 1s cubic-bezier(.4,0,.2,1); }

    /* ── FOOTER ── */
    footer {
      position:relative; z-index:1;
      border-top:1px solid var(--border);
      padding:20px 32px;
      display:flex; justify-content:space-between; align-items:center;
      color:var(--muted); font-size:.75rem;
    }
    .update-dot { width:6px; height:6px; background:#44ff88; border-radius:50%; display:inline-block; margin-right:6px; }

    ::-webkit-scrollbar { width:6px; height:6px; }
    ::-webkit-scrollbar-track { background:var(--bg); }
    ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

    @media(max-width:640px) {
      header { padding:0 16px; }
      main { padding:20px 16px 60px; }
      .members-grid { grid-template-columns:repeat(auto-fill,minmax(100px,1fr)); }
      nav .nav-btn:not(.active) { display:none; }
      .stats-summary { grid-template-columns:1fr 1fr; }
    }
  </style>
</head>
<body>

<!-- ローディング画面 -->
<div class="loading-screen" id="loadingScreen">
  <div class="loading-spinner"></div>
  <div class="loading-text">データを読み込み中...</div>
</div>

<!-- HEADER -->
<header>
  <div class="logo">
    <div class="logo-icon">🎮</div>
    <div>
      <div class="logo-text">VSPO! SCHEDULE</div>
      <div class="logo-sub">ぶいすぽっ！非公式スケジュール</div>
    </div>
  </div>
  <nav>
    <button class="nav-btn active" onclick="showView('schedule',this)">スケジュール</button>
    <button class="nav-btn"        onclick="showView('stats',this)">月間統計</button>
    <button class="nav-btn"        onclick="showView('members',this)">メンバー</button>
    <div class="lang-switch">
      <button class="lang-btn active" onclick="setLang('ja')">JP</button>
      <button class="lang-btn"        onclick="setLang('en')">EN</button>
    </div>
  </nav>
</header>

<!-- LIVE BANNER -->
<div class="live-banner" id="liveBanner" style="display:none">
  <div class="live-dot"></div>
  <span style="font-size:.8rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;font-family:'Rajdhani',sans-serif;flex-shrink:0;">Live Now</span>
  <div class="live-items" id="liveItems"></div>
</div>

<main>
  <!-- ① メンバー -->
  <section id="members-section" style="margin-bottom:48px">
    <div class="section-header">
      <div class="section-title" data-ja="メンバー" data-en="Members">メンバー</div>
      <div class="section-line"></div>
    </div>
    <div class="members-grid" id="membersGrid"></div>
  </section>

  <!-- ② スケジュール -->
  <section id="schedule-section">
    <div class="section-header">
      <div class="section-title" data-ja="配信スケジュール" data-en="Stream Schedule">配信スケジュール</div>
      <div class="section-line"></div>
    </div>
    <div class="date-tabs" id="dateTabs"></div>
    <div class="schedule-list" id="scheduleList"></div>
  </section>

  <!-- ③ 月間統計 -->
  <section id="stats-section" style="display:none">
    <div class="section-header">
      <div class="section-title" data-ja="月間統計" data-en="Monthly Stats">月間統計</div>
      <div class="section-line"></div>
    </div>
    <div class="month-control">
      <button class="month-nav" onclick="changeMonth(-1)">‹</button>
      <div class="month-label" id="monthLabel">—</div>
      <button class="month-nav" onclick="changeMonth(1)">›</button>
    </div>
    <div class="stats-summary">
      <div class="summary-card" style="--card-accent:#7c5cfc">
        <div class="summary-label" data-ja="総配信回数" data-en="Total Streams">総配信回数</div>
        <div class="summary-value" id="stat-count">—</div>
        <div class="summary-sub" id="stat-count-sub"></div>
      </div>
      <div class="summary-card" style="--card-accent:#fc5c9c">
        <div class="summary-label" data-ja="総配信時間" data-en="Total Hours">総配信時間</div>
        <div class="summary-value" id="stat-hours">—</div>
        <div class="summary-sub" id="stat-hours-sub"></div>
      </div>
      <div class="summary-card" style="--card-accent:#34d399">
        <div class="summary-label" data-ja="1配信の平均時間" data-en="Avg. Duration">1配信の平均時間</div>
        <div class="summary-value" id="stat-avg">—</div>
        <div class="summary-sub" id="stat-avg-sub"></div>
      </div>
      <div class="summary-card" style="--card-accent:#f59e0b">
        <div class="summary-label" data-ja="配信があった日数" data-en="Active Days">配信があった日数</div>
        <div class="summary-value" id="stat-days">—</div>
        <div class="summary-sub" id="stat-days-sub"></div>
      </div>
    </div>
    <div class="ranking-grid">
      <div class="ranking-card">
        <div class="ranking-card-title" data-ja="配信時間ランキング" data-en="Stream Hours Ranking">配信時間ランキング</div>
        <div id="rankHours"></div>
      </div>
      <div class="ranking-card">
        <div class="ranking-card-title" data-ja="配信回数ランキング" data-en="Stream Count Ranking">配信回数ランキング</div>
        <div id="rankCount"></div>
      </div>
    </div>
    <div class="heatmap-wrap">
      <div class="heatmap-title" data-ja="配信カレンダー（色が濃いほど配信が多い日）" data-en="Stream Calendar">配信カレンダー（色が濃いほど配信が多い日）</div>
      <div class="heatmap-grid" id="heatmapGrid"></div>
    </div>
    <div class="platform-breakdown">
      <div class="platform-breakdown-title" data-ja="プラットフォーム内訳" data-en="Platform Breakdown">プラットフォーム内訳</div>
      <div class="platform-bars" id="platformBars"></div>
    </div>
  </section>
</main>

<footer>

  <div><span class="update-dot"></span><span id="updateTime">—</span></div>
</footer>

<script>
// ============================================================
// メンバーデータ（全25人・実際の情報）
// ============================================================
const MEMBERS = [
  { id:'sumire',  nameJa:'花芽すみれ',   nameEn:'Kaga Sumire',      handle:'kagasumire',     color:'#ff6b9d' },
  { id:'nazuna',  nameJa:'花芽なずな',   nameEn:'Kaga Nazuna',      handle:'nazunalive',     color:'#a78bfa' },
  { id:'toto',    nameJa:'夢野あかり',   nameEn:'Yumeno Akari',     handle:'yumenoakari',    color:'#fb923c' },
  { id:'uruha',   nameJa:'一ノ瀬うるは', nameEn:'Ichinose Uruha',   handle:'ichinose_uruha', color:'#f472b6' },
  { id:'noah',    nameJa:'胡桃のあ',     nameEn:'Kurumi Noah',      handle:'noakiryu',       color:'#34d399' },
  { id:'mimi',    nameJa:'兎咲ミミ',     nameEn:'Tosaki Mimi',      handle:'mimi_vspo',      color:'#f9a8d4' },
  { id:'beni',    nameJa:'八雲べに',     nameEn:'Yakumo Beni',      handle:'beni_vspo',      color:'#f87171' },
  { id:'lisa',    nameJa:'英リサ',       nameEn:'Hanabusa Lisa',    handle:'lisahanabusa',   color:'#c084fc' },
  { id:'hinano',  nameJa:'橘ひなの',     nameEn:'Tachibana Hinano', handle:'hinano_vspo',    color:'#f59e0b' },
  { id:'sena',    nameJa:'空澄セナ',     nameEn:'Kasumi Sena',      handle:'kasumisena',     color:'#60a5fa' },
  { id:'ren',     nameJa:'如月れん',     nameEn:'Kisaragi Ren',     handle:'ren_vspo',       color:'#7dd3fc' },
  { id:'kyupi',   nameJa:'神成きゅぴ',   nameEn:'Kannagi Kyupi',    handle:'kyupi_vspo',     color:'#facc15' },
  { id:'ema',     nameJa:'藍沢エマ',     nameEn:'Aizawa Ema',       handle:'aizawa_ema',     color:'#6ee7b7' },
  { id:'runa',    nameJa:'空星きらめ',   nameEn:'Sorasei Kirame',   handle:'kirame_vspo',    color:'#93c5fd' },
  { id:'tuna',    nameJa:'猫汰つな',     nameEn:'Nekota Tsuna',     handle:'nekota_tsuna',   color:'#fca5a5' },
  { id:'ramune',  nameJa:'白波らむね',   nameEn:'Shironami Ramune', handle:'ramune_vspo',    color:'#86efac' },
  { id:'meto',    nameJa:'音霊魂子',     nameEn:'Otoitama Tamako',  handle:'meto_vspo',      color:'#d8b4fe' },
  { id:'akari',   nameJa:'夢野あかり',   nameEn:'Yumeno Akari',     handle:'akari_vspo',     color:'#fcd34d' },
  { id:'kuromu',  nameJa:'夜乃くろむ',   nameEn:'Yano Kuromu',      handle:'kuromu_vspo',    color:'#818cf8' },
  { id:'kokage',  nameJa:'紡木こかげ',   nameEn:'Tsumugi Kokage',   handle:'kokage_tsumugi', color:'#5eead4' },
  { id:'yuuhi',   nameJa:'千燈ゆうひ',   nameEn:'Sendo Yuuhi',      handle:'yuuhi_vspo',     color:'#fda4af' },
  { id:'hanabi',  nameJa:'花火しまこ',   nameEn:'Hanabi Shimako',   handle:'hanabi_vspo',    color:'#fdba74' },
  { id:'moka',    nameJa:'如月もか',     nameEn:'Kisaragi Moka',    handle:'moka_vspo',      color:'#a5f3fc' },
  { id:'saine',   nameJa:'西園寺さいね', nameEn:'Saionji Saine',    handle:'saine_vspo',     color:'#bbf7d0' },
  { id:'chise',   nameJa:'地声ちせ',     nameEn:'Jikoe Chise',      handle:'chise_vspo',     color:'#e9d5ff' },
];

// ============================================================
// 状態管理
// ============================================================
let lang         = 'ja';
let activeMember = null;
let activeDate   = 0;
let statsYear    = new Date().getFullYear();
let statsMonth   = new Date().getMonth();
let SCHEDULE     = [];
let LIVE         = [];
let STATS        = {};
const today      = new Date();

// ============================================================
// データ取得（GitHub Pagesから）
// ============================================================
async function fetchSchedule() {
  try {
    const res = await fetch('schedule.json?t=' + Date.now());
    SCHEDULE = await res.json();
  } catch(e) {
    console.error('schedule.json読み込みエラー:', e);
    SCHEDULE = [];
  }
}

async function fetchLive() {
  try {
    const res = await fetch('live.json?t=' + Date.now());
    LIVE = await res.json();
  } catch(e) {
    LIVE = [];
  }
}

async function fetchStats() {
  try {
    const res = await fetch('stats.json?t=' + Date.now());
    STATS = await res.json();
  } catch(e) {
    STATS = {};
  }
}

// ============================================================
// 初期化
// ============================================================
async function init() {
  // データを並行取得
  await Promise.all([fetchSchedule(), fetchLive(), fetchStats()]);

  // ローディング画面を消す
  document.getElementById('loadingScreen').style.display = 'none';

  renderMembers();
  renderDateTabs();
  renderSchedule();
  renderLiveBanner();
  renderStats();
  updateTime();

  // 5分ごとにライブ状況を自動更新
  setInterval(async () => {
    await fetchLive();
    renderLiveBanner();
    renderMembers();
  }, 5 * 60 * 1000);

  // 30分ごとにスケジュールを自動更新
  setInterval(async () => {
    await fetchSchedule();
    renderSchedule();
    updateTime();
  }, 30 * 60 * 1000);
}

// ============================================================
// 言語切り替え
// ============================================================
function setLang(l) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.textContent.trim() === l.toUpperCase()));
  document.querySelectorAll('[data-ja]').forEach(el => { el.textContent = l === 'ja' ? el.dataset.ja : el.dataset.en; });
  renderMembers();
  renderSchedule();
  renderStats();
}

// ============================================================
// ビュー切り替え
// ============================================================
function showView(v, btn) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('members-section').style.display  = (v === 'members' || v === 'schedule') ? '' : 'none';
  document.getElementById('schedule-section').style.display = (v === 'schedule') ? '' : 'none';
  document.getElementById('stats-section').style.display    = (v === 'stats')    ? '' : 'none';
}

// ============================================================
// メンバーカード
// ============================================================
function renderMembers() {
  const liveIds = LIVE.map(l => l.memberId);
  document.getElementById('membersGrid').innerHTML = MEMBERS.map(m => {
    const name   = lang === 'ja' ? m.nameJa : m.nameEn;
    const isAct  = activeMember === m.id;
    const isLive = liveIds.includes(m.id);
    const liveData = LIVE.find(l => l.memberId === m.id);
    const avatarUrl = `https://unavatar.io/youtube/${m.handle}`;
    return `<div class="member-card ${isAct ? 'active' : ''}" style="--member-color:${m.color}" onclick="filterMember('${m.id}')">
      <div class="member-avatar">
        <img src="${avatarUrl}" alt="${name}" onerror="this.style.display='none';this.parentNode.textContent='👤'">
      </div>
      <div class="member-name">${name}</div>
      <div class="member-handle">@${m.handle}</div>
      ${isLive ? `<div class="live-badge"><span style="width:5px;height:5px;background:#fff;border-radius:50%;display:inline-block"></span> LIVE</div>` : ''}
    </div>`;
  }).join('');
}

function filterMember(id) {
  activeMember = activeMember === id ? null : id;
  renderMembers();
  renderSchedule();
}

// ============================================================
// 日付タブ
// ============================================================
const WD_JA = ['日','月','火','水','木','金','土'];
const WD_EN = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

function renderDateTabs() {
  document.getElementById('dateTabs').innerHTML = Array.from({ length: 7 }, (_, i) => {
    const d = new Date(today);
    d.setDate(d.getDate() + i);
    const wd    = lang === 'ja' ? WD_JA[d.getDay()] : WD_EN[d.getDay()];
    const label = i === 0 ? (lang === 'ja' ? '今日' : 'Today') : (i === 1 ? (lang === 'ja' ? '明日' : 'Tmrw') : wd);
    return `<div class="date-tab ${activeDate === i ? 'active' : ''}" onclick="setDate(${i})">
      <div class="weekday">${label}</div>
      <div class="day">${d.getMonth()+1}/${d.getDate()}</div>
    </div>`;
  }).join('');
}

function setDate(i) {
  activeDate = i;
  renderDateTabs();
  renderSchedule();
}

// ============================================================
// スケジュールリスト
// ============================================================
function renderSchedule() {
  const list = document.getElementById('scheduleList');
  const tgt  = new Date(today);
  tgt.setDate(tgt.getDate() + activeDate);

  // live.jsonのライブ中データをSCHEDULEにマージ
  const allItems = [
    ...LIVE.map(l => ({ ...l, isLive: true })),
    ...SCHEDULE.filter(s => !LIVE.find(l => l.memberId === s.memberId && l.platform === s.platform))
  ];

  let items = allItems.filter(s => {
    const dt = new Date(s.datetime || s.startedAt);
    const sameDay = dt.getFullYear() === tgt.getFullYear() &&
                    dt.getMonth()    === tgt.getMonth()    &&
                    dt.getDate()     === tgt.getDate();
    return sameDay && (!activeMember || s.memberId === activeMember);
  }).sort((a, b) => new Date(a.datetime || a.startedAt) - new Date(b.datetime || b.startedAt));

  if (!items.length) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">📭</div>
      <div class="empty-text">${lang === 'ja' ? 'この日の配信予定はありません' : 'No streams scheduled for this day'}</div></div>`;
    return;
  }

  list.innerHTML = items.map(s => {
    const m = MEMBERS.find(x => x.id === s.memberId);
    if (!m) return '';
    const name   = lang === 'ja' ? m.nameJa : m.nameEn;
    const dt     = new Date(s.datetime || s.startedAt);
    const hh     = String(dt.getHours()).padStart(2, '0');
    const mm     = String(dt.getMinutes()).padStart(2, '0');
    const dur    = s.durationMin ? `${Math.floor(s.durationMin/60)}h${s.durationMin%60 ? s.durationMin%60+'m' : ''}` : '';
    const plabel = s.isLive ? 'LIVE NOW' : (s.platform === 'youtube' ? 'YouTube' : 'Twitch');
    const bcls   = s.isLive ? 'live-now' : s.platform;
    const url    = s.url || (s.platform === 'youtube' ? `https://www.youtube.com/@${m.handle}` : `https://www.twitch.tv/${m.handle}`);
    return `<a class="schedule-card ${s.isLive ? 'is-live' : ''}" href="${url}" target="_blank" rel="noopener" style="--card-color:${m.color}">
      <div class="card-avatar">
        <img src="https://unavatar.io/youtube/${m.handle}" alt="${name}" onerror="this.style.display='none';this.parentNode.textContent='👤'">
      </div>
      <div class="card-info">
        <div class="card-member">${name}<span class="platform-badge ${bcls}">${plabel}</span>${dur ? `<span style="font-size:.7rem;color:var(--muted)">⏱ ${dur}</span>` : ''}</div>
        <div class="card-title">${s.title}</div>
      </div>
      <div class="card-time">
        <div class="time">${hh}:${mm}</div>
        <div class="date-label">${dt.getMonth()+1}/${dt.getDate()}</div>
      </div>
    </a>`;
  }).join('');
}

// ============================================================
// LIVEバナー
// ============================================================
function renderLiveBanner() {
  const banner = document.getElementById('liveBanner');
  if (!LIVE.length) { banner.style.display = 'none'; return; }
  banner.style.display = 'flex';
  document.getElementById('liveItems').innerHTML = LIVE.map(l => {
    const m    = MEMBERS.find(x => x.id === l.memberId);
    if (!m) return '';
    const name = lang === 'ja' ? m.nameJa : m.nameEn;
    return `<a class="live-item" href="${l.url}" target="_blank" rel="noopener">
      <span>${lang === 'ja' ? m.nameJa[0] : '🎮'}</span>
      <span>${name}</span>
      <span style="font-size:.7rem;color:rgba(255,255,255,.5)">${l.platform === 'twitch' ? '🟣' : '▶'}</span>
    </a>`;
  }).join('');
}

// ============================================================
// 月間統計
// ============================================================
function changeMonth(delta) {
  statsMonth += delta;
  if (statsMonth > 11) { statsMonth = 0; statsYear++; }
  if (statsMonth <  0) { statsMonth = 11; statsYear--; }
  renderStats();
}

function renderStats() {
  const monthNames_ja = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  const monthNames_en = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const key = `${statsYear}-${String(statsMonth+1).padStart(2,'0')}`;
  const daysInMonth = new Date(statsYear, statsMonth+1, 0).getDate();

  document.getElementById('monthLabel').textContent =
    lang === 'ja' ? `${statsYear}年 ${monthNames_ja[statsMonth]}` : `${monthNames_en[statsMonth]} ${statsYear}`;

  // stats.jsonからデータ取得、なければSCHEDULEから当月分を集計
  let streams = [];
  if (STATS[key]) {
    // stats.jsonにデータがある場合
    streams = Object.entries(STATS[key]).flatMap(([memberId, data]) =>
      Array.from({ length: data.count }, (_, i) => ({
        memberId,
        durationMin: Math.round(data.totalMins / data.count),
        platform: data.youtubeMins > data.twitchMins ? 'youtube' : 'twitch',
        day: Math.min(i + 1, daysInMonth),
      }))
    );
  } else {
    // 今月分はSCHEDULEから集計
    streams = SCHEDULE
      .filter(s => {
        const dt = new Date(s.datetime);
        return dt.getFullYear() === statsYear && dt.getMonth() === statsMonth;
      })
      .map(s => ({
        memberId   : s.memberId,
        durationMin: s.durationMin || 120,
        platform   : s.platform,
        day        : new Date(s.datetime).getDate(),
      }));
  }

  // サマリー
  const totalCount = streams.length;
  const totalMins  = streams.reduce((s, x) => s + (x.durationMin || 0), 0);
  const totalHours = (totalMins / 60).toFixed(1);
  const avgMins    = totalCount ? Math.round(totalMins / totalCount) : 0;
  const activeDays = new Set(streams.map(s => s.day)).size;

  function setText(id, val, sub) {
    document.getElementById(id).textContent = val;
    const el = document.getElementById(id + '-sub');
    if (el) el.textContent = sub;
  }
  setText('stat-count', totalCount,                          lang === 'ja' ? '回' : 'streams');
  setText('stat-hours', totalHours,                          lang === 'ja' ? '時間' : 'hours');
  setText('stat-avg',   `${Math.floor(avgMins/60)}h${avgMins%60}m`, lang === 'ja' ? '/ 1配信' : '/ stream');
  setText('stat-days',  `${activeDays}/${daysInMonth}`,      lang === 'ja' ? '日' : 'days');

  // ランキング
  const hoursMap = {}; const countMap = {};
  MEMBERS.forEach(m => { hoursMap[m.id] = 0; countMap[m.id] = 0; });
  streams.forEach(s => { hoursMap[s.memberId] += s.durationMin || 0; countMap[s.memberId]++; });

  const byHours  = MEMBERS.map(m => ({ ...m, mins: hoursMap[m.id], count: countMap[m.id] })).sort((a, b) => b.mins - a.mins);
  const maxMins  = byHours[0]?.mins || 1;
  const maxCount = Math.max(...MEMBERS.map(m => countMap[m.id])) || 1;
  const rankCls  = ['gold', 'silver', 'bronze'];

  document.getElementById('rankHours').innerHTML = byHours.map((m, i) => {
    const h = Math.floor(m.mins/60), mn = m.mins % 60;
    return `<div class="rank-row">
      <div class="rank-num ${rankCls[i]||''}">${i+1}</div>
      <div class="rank-name">${lang==='ja'?m.nameJa:m.nameEn}</div>
      <div class="rank-bar-wrap"><div class="rank-bar-bg">
        <div class="rank-bar-fill" style="width:${(m.mins/maxMins*100).toFixed(1)}%;--bar-color:${m.color}"></div>
      </div></div>
      <div class="rank-value">${h}h${mn}m</div>
    </div>`;
  }).join('');

  document.getElementById('rankCount').innerHTML = [...byHours].sort((a,b)=>b.count-a.count).map((m,i) => `
    <div class="rank-row">
      <div class="rank-num ${rankCls[i]||''}">${i+1}</div>
      <div class="rank-name">${lang==='ja'?m.nameJa:m.nameEn}</div>
      <div class="rank-bar-wrap"><div class="rank-bar-bg">
        <div class="rank-bar-fill" style="width:${(m.count/maxCount*100).toFixed(1)}%;--bar-color:${m.color}"></div>
      </div></div>
      <div class="rank-value">${m.count}${lang==='ja'?'回':'x'}</div>
    </div>`).join('');

  // ヒートマップ
  const dayCounts  = {};
  streams.forEach(s => { dayCounts[s.day] = (dayCounts[s.day]||0) + 1; });
  const firstDay   = new Date(statsYear, statsMonth, 1).getDay();
  const isThisMonth = statsYear === today.getFullYear() && statsMonth === today.getMonth();
  const wd_labels  = lang === 'ja' ? WD_JA : ['Su','Mo','Tu','We','Th','Fr','Sa'];

  let html = wd_labels.map(w => `<div class="heatmap-day-label">${w}</div>`).join('');
  for (let i = 0; i < firstDay; i++) html += `<div class="heatmap-cell empty-cell"></div>`;
  for (let d = 1; d <= daysInMonth; d++) {
    const cnt   = dayCounts[d] || 0;
    const level = cnt === 0 ? 0 : cnt <= 1 ? 1 : cnt <= 3 ? 2 : cnt <= 5 ? 3 : 4;
    html += `<div class="heatmap-cell ${isThisMonth && d === today.getDate() ? 'today-cell' : ''}"
      data-level="${level}" title="${d}日: ${cnt}件">${d}</div>`;
  }
  document.getElementById('heatmapGrid').innerHTML = html;

  // プラットフォーム内訳
  const ytCnt = streams.filter(s => s.platform === 'youtube').length;
  const twCnt = streams.filter(s => s.platform === 'twitch').length;
  const total = ytCnt + twCnt || 1;
  document.getElementById('platformBars').innerHTML = `
    <div class="platform-row">
      <div class="platform-row-header">
        <div class="platform-name" style="color:#ff8888">▶ YouTube</div>
        <div class="platform-pct">${ytCnt}${lang==='ja'?'件':'streams'} (${(ytCnt/total*100).toFixed(0)}%)</div>
      </div>
      <div class="platform-full-bar">
        <div class="platform-full-fill" style="width:${(ytCnt/total*100).toFixed(0)}%;background:var(--yt)"></div>
      </div>
    </div>
    <div class="platform-row">
      <div class="platform-row-header">
        <div class="platform-name" style="color:#b880ff">🟣 Twitch</div>
        <div class="platform-pct">${twCnt}${lang==='ja'?'件':'streams'} (${(twCnt/total*100).toFixed(0)}%)</div>
      </div>
      <div class="platform-full-bar">
        <div class="platform-full-fill" style="width:${(twCnt/total*100).toFixed(0)}%;background:var(--twitch)"></div>
      </div>
    </div>`;
}

// ============================================================
// 更新時刻
// ============================================================
function updateTime() {
  const now = new Date();
  document.getElementById('updateTime').textContent =
    `最終更新：${now.getMonth()+1}/${now.getDate()} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
}

// 起動
init();
</script>
</body>
</html>
